<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Dinuka Ekanayake — Software Engineer</title>
    <meta name="description" content="Full-stack software engineer specialising in scalable web apps, AR interfaces and applied AI systems." />
    <meta name="author" content="Dinuka Ekanayake" />
    <meta property="og:title" content="Dinuka Ekanayake — Software Engineer" />
    <meta property="og:description" content="Full-stack software engineer specialising in scalable web apps, AR interfaces and applied AI systems." />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23c84b2f'/><text x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-size='18' font-weight='900' font-family='sans-serif' fill='white'>D</text></svg>" />

    <!-- Font preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inline theme script — runs BEFORE any render to prevent flash -->
    <script>
      (function () {
        // 1. Apply saved theme immediately so CSS vars exist before React mounts
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (saved === 'light' || saved === 'dark') ? saved : (prefersDark ? 'dark' : 'light');
        var r = document.documentElement;
        if (theme === 'dark') {
          r.style.setProperty('--bg',        '#111010');
          r.style.setProperty('--fg',        '#ede9e3');
          r.style.setProperty('--accent',    '#e06040');
          r.style.setProperty('--accent2',   '#6da4d4');
          r.style.setProperty('--muted',     '#8a857e');
          r.style.setProperty('--card-bg',   '#1c1b1a');
          r.style.setProperty('--border',    'rgba(237,233,227,0.1)');
          r.style.setProperty('--border-sm', 'rgba(237,233,227,0.05)');
        } else {
          r.style.setProperty('--bg',        '#f5f2ee');
          r.style.setProperty('--fg',        '#0e0e0e');
          r.style.setProperty('--accent',    '#c84b2f');
          r.style.setProperty('--accent2',   '#1a3a5c');
          r.style.setProperty('--muted',     '#7a7570');
          r.style.setProperty('--card-bg',   '#ffffff');
          r.style.setProperty('--border',    'rgba(14,14,14,0.1)');
          r.style.setProperty('--border-sm', 'rgba(14,14,14,0.06)');
        }

        // 2. GitHub Pages SPA redirect restore
        var redirect = sessionStorage.getItem('ghpages_redirect');
        if (redirect && redirect !== '/') {
          sessionStorage.removeItem('ghpages_redirect');
          var base = window.location.pathname.includes('/portfolio-new') ? '/portfolio-new' : '';
          window.history.replaceState(null, '', base + redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
