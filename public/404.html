<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Dinuka Ekanayake</title>
    <script>
      // GitHub Pages 404 redirect trick
      // Stores the path in sessionStorage then redirects to index.html
      var path = window.location.pathname;
      var base = '/portfolio-new';
      var redirectPath = path.replace(base, '') || '/';
      sessionStorage.setItem('ghpages_redirect', redirectPath);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
